<div dir="rtl" class="h-screen overflow-hidden bg-[var(--bg-base)] flex flex-col">
  <div class="bg-[var(--bg-card)] px-4 py-3 border-b border-[var(--border)] flex items-center gap-3 flex-shrink-0">
    <button (click)="goBack()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[var(--bg-base)]">
      <svg lucideArrowRight class="w-5 h-5 text-[var(--text-primary)]"></svg>
    </button>
    <span class="text-[16px] font-bold text-[var(--text-primary)]">تسجيل الدخول</span>
  </div>

  <div class="flex-1 flex flex-col items-center justify-center px-6 gap-6">
    <div class="flex flex-col items-center gap-3">
      <div class="w-14 h-14 rounded-full bg-[var(--primary-light)] flex items-center justify-center">
        <svg lucidePhone class="w-7 h-7 text-[var(--primary)]"></svg>
      </div>
      <h1 class="text-xl font-extrabold text-[var(--text-primary)]">مرحباً بك</h1>
      <p class="text-sm text-[var(--text-muted)] text-center">سجل دخولك لمتابعة حجوزاتك</p>
    </div>

    <div class="flex flex-col gap-4 w-full max-w-sm">
      <div class="flex items-center gap-3 px-4 py-3.5 rounded-2xl border border-[var(--border)] bg-[var(--bg-card)]">
        <svg lucidePhone class="w-5 h-5 text-[var(--text-muted)] flex-shrink-0"></svg>
        <input type="text" [ngModel]="identifier()" (ngModelChange)="identifier.set($event)" placeholder="رقم الهاتف أو البريد الإلكتروني" class="flex-1 bg-transparent outline-none text-[15px] font-semibold text-[var(--text-primary)] placeholder:text-[var(--text-muted)] placeholder:font-normal">
      </div>

      <div class="flex items-center gap-3 px-4 py-3.5 rounded-2xl border border-[var(--border)] bg-[var(--bg-card)]">
        <svg lucideLock class="w-5 h-5 text-[var(--text-muted)] flex-shrink-0"></svg>
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" placeholder="كلمة المرور" class="flex-1 bg-transparent outline-none text-[15px] font-semibold text-[var(--text-primary)] placeholder:text-[var(--text-muted)] placeholder:font-normal">
      </div>

      @if (error()) {
        <p class="text-sm text-red-500 font-semibold text-center">{{ error() }}</p>
      }

      <button (click)="submit()" class="flex items-center justify-center gap-2 w-full py-4 rounded-2xl bg-[var(--primary)] text-white font-bold text-[15px] active:scale-[0.98] transition-all duration-150 shadow-lg">
        <svg lucideLogIn class="w-5 h-5"></svg>
        <span>تسجيل الدخول</span>
      </button>

      <div class="text-center">
        <span class="text-[13px] text-[var(--text-muted)]">ليس لديك حساب؟ </span>
        <a routerLink="/m/register" class="text-[13px] font-bold text-[var(--primary)]">إنشاء حساب</a>
      </div>
    </div>
  </div>
</div>
