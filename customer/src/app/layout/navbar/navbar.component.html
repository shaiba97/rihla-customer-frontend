<header
  dir="rtl"
  class="w-full sticky top-0 z-50
         bg-[var(--bg-card)]/95
         backdrop-blur-md
         border-b border-[var(--border)]
         shadow-[0_1px_8px_var(--shadow)]">

  <nav class="max-w-7xl mx-auto
              flex items-center
              justify-between
              px-4 md:px-6 h-16">

    <!-- RIGHT: Logo -->
    <a routerLink="/"
       class="flex items-center gap-2.5
              no-underline flex-shrink-0
              group">

      <!-- Logo icon -->
      <div class="w-9 h-9 rounded-xl
                  flex items-center justify-center
                  bg-gradient-to-br
                  from-[var(--primary)]
                  to-[var(--primary-hover)]
                  shadow-sm
                  group-hover:shadow-md
                  group-hover:scale-105
                  transition-all duration-200">
        <svg lucideBus
             class="w-5 h-5"
             color="white">
        </svg>
      </div>

      <!-- Logo text -->
      <div class="flex flex-col leading-none">
        <span class="text-lg font-extrabold
                     text-[var(--primary)]
                     leading-tight">
          رحلة
        </span>
        <span class="text-[9px] font-medium
                     text-[var(--text-muted)]
                     tracking-wider">
          RIHLA
        </span>
      </div>

    </a>

    <!-- LEFT: Actions -->
    <div class="flex items-center gap-2">

      <!-- Theme toggle -->
      <button
        (click)="themeService.toggle()"
        class="w-9 h-9 rounded-xl
               flex items-center justify-center
               text-[var(--text-secondary)]
               hover:bg-[var(--primary-light)]
               hover:text-[var(--primary)]
               transition-all duration-150">
        @if (themeService.isDark()) {
          <svg lucideSun
               class="w-[18px] h-[18px]
                      text-amber-400">
          </svg>
        } @else {
          <svg lucideMoon
               class="w-[18px] h-[18px]">
          </svg>
        }
      </button>

      <!-- NOT LOGGED IN -->
      @if (!isLoggedIn()) {

        <!-- Divider -->
        <div class="w-px h-6
                    bg-[var(--border)]
                    mx-1 hidden md:block">
        </div>

        <!-- Login + Signup (desktop) -->
        <div class="hidden md:flex
                    items-center gap-2">

          <!-- Login -->
          <a routerLink="/auth/login"
             class="flex items-center gap-1.5
                    px-4 py-2 rounded-xl
                    text-sm font-semibold
                    text-[var(--primary)]
                    hover:bg-[var(--primary-light)]
                    transition-all duration-150
                    no-underline">
            <svg lucideLogIn
                 class="w-4 h-4 flex-shrink-0">
            </svg>
            <span>تسجيل الدخول</span>
          </a>

          <!-- Signup -->
          <a routerLink="/auth/register"
             class="flex items-center gap-1.5
                    px-4 py-2 rounded-xl
                    text-sm font-semibold
                    bg-[var(--primary)]
                    text-white
                    hover:bg-[var(--primary-hover)]
                    active:scale-95
                    transition-all duration-150
                    no-underline
                    shadow-sm
                    hover:shadow-md">
            <svg lucideUserPlus
                 class="w-4 h-4 flex-shrink-0">
            </svg>
            <span>إنشاء حساب</span>
          </a>

        </div>

        <!-- Mobile hamburger (not logged in) -->
        <button
          (click)="toggleMobileMenu()"
          class="md:hidden w-9 h-9 rounded-xl
                 flex items-center justify-center
                 text-[var(--text-secondary)]
                 hover:bg-[var(--primary-light)]
                 hover:text-[var(--primary)]
                 transition-all duration-150">
          @if (showMobileMenu()) {
            <svg lucideX class="w-5 h-5"></svg>
          } @else {
            <svg lucideMenu class="w-5 h-5"></svg>
          }
        </button>

      }

      <!-- LOGGED IN -->
      @if (isLoggedIn()) {

        <!-- Divider -->
        <div class="w-px h-6
                    bg-[var(--border)]
                    mx-1">
        </div>

        <!-- User menu -->
        <div class="relative" data-user-menu>

          <!-- Avatar trigger button -->
          <button
            (click)="toggleUserMenu()"
            class="flex items-center gap-2
                   px-2 py-1.5 rounded-xl
                   hover:bg-[var(--primary-light)]
                   transition-all duration-150
                   cursor-pointer">

            <!-- User icon circle -->
            <div class="w-8 h-8 rounded-full
                        flex items-center
                        justify-center
                        flex-shrink-0
                        bg-gradient-to-br
                        from-[var(--primary)]
                        to-[var(--primary-hover)]
                        shadow-sm">
              <svg lucideUserRound
                   class="w-4 h-4"
                   color="white">
              </svg>
            </div>

            <!-- Username (desktop only) -->
            <div class="hidden md:flex flex-col
                        items-end leading-none
                        gap-0.5">
              <span class="text-xs font-semibold
                           text-[var(--text-primary)]">
                {{ userName() }}
              </span>
              <span class="text-[9px]
                           text-[var(--text-muted)]">
                مرحباً بك
              </span>
            </div>

            <!-- Chevron -->
            <svg lucideChevronDown
                 class="w-3.5 h-3.5
                        text-[var(--text-muted)]
                        hidden md:block
                        transition-transform
                        duration-200"
                 [class.rotate-180]="showUserMenu()">
            </svg>

          </button>

          <!-- Dropdown menu -->
          @if (showUserMenu()) {
            <div class="absolute left-0 top-12
                        w-56
                        bg-[var(--bg-card)]
                        border border-[var(--border)]
                        rounded-2xl
                        shadow-[0_8px_32px_var(--shadow)]
                        overflow-hidden
                        z-50
                        animate-in
                        fade-in
                        slide-in-from-top-2
                        duration-150">

              <!-- User info header -->
              <div class="px-4 py-3
                          bg-[var(--primary-light)]
                          border-b
                          border-[var(--border)]">
                <div class="flex items-center
                            gap-3">
                  <div class="w-10 h-10 rounded-full
                              flex items-center
                              justify-center
                              flex-shrink-0
                              bg-gradient-to-br
                              from-[var(--primary)]
                              to-[var(--primary-hover)]">
                    <svg lucideUserRound
                         class="w-5 h-5"
                         color="white">
                    </svg>
                  </div>
                  <div class="flex flex-col
                              min-w-0">
                    <span class="text-sm font-bold
                                 text-[var(--text-primary)]
                                 truncate">
                      {{ userName() }}
                    </span>
                    <span class="text-xs
                                 text-[var(--text-secondary)]">
                      عميل
                    </span>
                  </div>
                </div>
              </div>

              <!-- Menu items -->
              <div class="p-1.5 flex flex-col gap-0.5">

                <!-- My Bookings -->
                <a routerLink="/bookings"
                   (click)="showUserMenu.set(false)"
                   class="flex items-center gap-3
                          px-3 py-2.5 rounded-xl
                          text-sm font-medium
                          text-[var(--text-secondary)]
                          hover:bg-[var(--primary-light)]
                          hover:text-[var(--primary)]
                          transition-all duration-150
                          no-underline group">
                  <svg lucideCalendarCheck
                       class="w-4 h-4 flex-shrink-0
                              text-[var(--text-muted)]
                              group-hover:text-[var(--primary)]
                              transition-colors">
                  </svg>
                  <span>حجوزاتي</span>
                </a>

                <!-- Profile -->
                <a routerLink="/profile"
                   (click)="showUserMenu.set(false)"
                   class="flex items-center gap-3
                          px-3 py-2.5 rounded-xl
                          text-sm font-medium
                          text-[var(--text-secondary)]
                          hover:bg-[var(--primary-light)]
                          hover:text-[var(--primary)]
                          transition-all duration-150
                          no-underline group">
                  <svg lucideSettings
                       class="w-4 h-4 flex-shrink-0
                              text-[var(--text-muted)]
                              group-hover:text-[var(--primary)]
                              transition-colors">
                  </svg>
                  <span>الملف الشخصي</span>
                </a>

                <!-- Divider -->
                <div class="h-px bg-[var(--border)]
                            my-1">
                </div>

                <!-- Logout -->
                <button
                  (click)="logout()"
                  class="flex items-center gap-3
                         px-3 py-2.5 rounded-xl
                         text-sm font-medium w-full
                         text-right
                         text-red-500
                         hover:bg-red-50
                         dark:hover:bg-red-950/20
                         transition-all duration-150
                         group">
                  <svg lucideLogOut
                       class="w-4 h-4 flex-shrink-0
                              transition-transform
                              duration-150
                              group-hover:-translate-x-0.5">
                  </svg>
                  <span>تسجيل الخروج</span>
                </button>

              </div>
            </div>
          }

        </div>
      }

    </div>
  </nav>

  <!-- MOBILE MENU (not logged in only) -->
  @if (showMobileMenu() && !isLoggedIn()) {
    <div class="md:hidden
                bg-[var(--bg-card)]
                border-t border-[var(--border)]
                px-4 py-4
                flex flex-col gap-3
                animate-in
                slide-in-from-top-2
                duration-150">

      <!-- Login -->
      <a routerLink="/auth/login"
         (click)="showMobileMenu.set(false)"
         class="flex items-center justify-center
                gap-2 px-4 py-3 rounded-xl
                text-sm font-semibold
                border border-[var(--primary)]
                text-[var(--primary)]
                hover:bg-[var(--primary-light)]
                transition-all duration-150
                no-underline">
        <svg lucideLogIn class="w-4 h-4"></svg>
        <span>تسجيل الدخول</span>
      </a>

      <!-- Signup -->
      <a routerLink="/auth/register"
         (click)="showMobileMenu.set(false)"
         class="flex items-center justify-center
                gap-2 px-4 py-3 rounded-xl
                text-sm font-semibold
                bg-[var(--primary)] text-white
                hover:bg-[var(--primary-hover)]
                transition-all duration-150
                no-underline">
        <svg lucideUserPlus class="w-4 h-4"></svg>
        <span>إنشاء حساب</span>
      </a>

    </div>
  }

</header>

<router-outlet />
