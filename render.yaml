services:
  - type: web
    name: rihla-backend
    runtime: docker
    repo: https://github.com/shaiba97/Rihla
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      # Required
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      # Server ports (optional, defaults used if omitted)
      - key: ADMIN_PORT
        value: "3000"
      - key: COMPANY_PORT
        value: "3001"
      - key: CUSTOMER_PORT
        value: "3002"
      # CORS origins (comma-separated)
      - key: CORS_ORIGINS
        value: https://your-admin-domain.com,https://your-company-domain.com,https://your-customer-domain.com
      # Redis
      - key: REDIS_HOST
        value: redis
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      # WhatsApp (optional)
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      # Node environment
      - key: NODE_ENV
        value: production
