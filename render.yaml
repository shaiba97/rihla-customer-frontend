services:
  # PostgreSQL Database
  - type: pserv
    name: rihla-database
    runtime: postgres15
    ipAllowList: []
    databaseName: rihla
    user: rihla_user
    plan: starter
    region: oregon
    postgresSyncSource: null

  # Redis Cache
  - type: redis
    name: rihla-cache
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    plan: starter
    region: oregon

  # Admin Service (Microservice)
  - type: web
    name: rihla-admin-service
    runtime: docker
    repo: https://github.com/shaiba97/Rihla
    branch: main
    buildCommand: npm install && npm run build:admin
    startCommand: npm run start:admin
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PORT
        value: "3000"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: rihla-database
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: rihla-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: rihla-cache
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: rihla-cache
          property: password
      - key: CORS_ORIGINS
        value: https://admin.your-domain.com
      - key: NODE_ENV
        value: production
    resources:
      cpu: 0.5
      memoryGB: 1

  # Company Service (Microservice)
  - type: web
    name: rihla-company-service
    runtime: docker
    repo: https://github.com/shaiba97/Rihla
    branch: main
    buildCommand: npm install && npm run build:company
    startCommand: npm run start:company
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: COMPANY_PORT
        value: "3001"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: rihla-database
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: rihla-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: rihla-cache
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: rihla-cache
          property: password
      - key: CORS_ORIGINS
        value: https://company.your-domain.com
    resources:
      cpu: 0.5
      memoryGB: 1

  # Customer Service (Microservice)
  - type: web
    name: rihla-customer-service
    runtime: docker
    repo: https://github.com/shaiba97/Rihla
    branch: main
    buildCommand: npm install && npm run build:customer
    startCommand: npm run start:customer
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: CUSTOMER_PORT
        value: "3002"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: rihla-database
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: rihla-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: rihla-cache
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: rihla-cache
          property: password
      - key: CORS_ORIGINS
        value: https://customer.your-domain.com
    resources:
      cpu: 0.5
      memoryGB: 1

  # Admin Frontend
  - type: web
    name: rihla-admin-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve dist/admin -p $PORT
    repo: https://github.com/shaiba97/Rihla
    branch: main
    rootDir: admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://rihla-admin-service.onrender.com
    resources:
      cpu: 0.25
      memoryGB: 0.5

  # Company Frontend
  - type: web
    name: rihla-company-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve dist/company -p $PORT
    repo: https://github.com/shaiba97/Rihla
    branch: main
    rootDir: company
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://rihla-company-service.onrender.com
    resources:
      cpu: 0.25
      memoryGB: 0.5

  # Customer Frontend
  - type: web
    name: rihla-customer-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve dist/customer -p $PORT
    repo: https://github.com/shaiba97/Rihla
    branch: main
    rootDir: customer
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://rihla-customer-service.onrender.com
    resources:
      cpu: 0.25
      memoryGB: 0.5
