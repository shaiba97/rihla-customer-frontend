<div class="flex flex-row-reverse h-screen
            overflow-hidden bg-[var(--bg-base)]"
     dir="rtl">

  <app-sidebar
    [isOpen]="sidebarOpen()"
    (closeSidebar)="sidebarOpen.set(false)">
  </app-sidebar>

  @if (sidebarOpen()) {
    <div class="fixed inset-0 bg-black/40
                backdrop-blur-sm z-40 md:hidden"
         (click)="sidebarOpen.set(false)">
    </div>
  }

  <div class="flex-1 flex flex-col
              overflow-hidden min-w-0">
    <app-topbar
      (toggleSidebar)="toggleSidebar()">
    </app-topbar>
    <main class="flex-1 overflow-y-auto p-6 md:p-4
                 bg-[var(--bg-base)]">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
