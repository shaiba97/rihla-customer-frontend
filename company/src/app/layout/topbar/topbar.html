<header class="h-16 bg-[var(--bg-card)]
               border-b border-[var(--border)]
               flex items-center
               justify-between px-5
               sticky top-0 z-30
               shadow-[0_1px_4px_var(--shadow)]
               flex-shrink-0">

  <div class="flex items-center gap-3">
    <button
      (click)="toggleSidebar.emit()"
      class="md:hidden w-9 h-9 rounded-lg
             flex items-center justify-center
             text-[var(--text-secondary)]
             hover:bg-[var(--primary-light)]
             hover:text-[var(--primary)]
             transition-all duration-150">
      ☰
    </button>

    <div class="flex items-center gap-2">
      <span class="text-lg">{{ currentPageIcon() }}</span>
      <span class="text-base font-semibold
                   text-[var(--text-primary)]">
        {{ currentPageTitle() }}
      </span>
    </div>
  </div>

  <div class="relative" data-dropdown>
    <button
      (click)="showNotifications.update(v => !v); showUserMenu.set(false)"
      class="relative w-10 h-10 rounded-xl
             flex items-center justify-center
             text-[var(--text-secondary)]
             hover:bg-[var(--primary-light)]
             hover:text-[var(--primary)]
             transition-all duration-150">
      🔔
      @if (unreadCount() > 0) {
        <span class="absolute top-1.5 left-1.5
                     min-w-[16px] h-4 px-1
                     bg-red-500 text-white
                     text-[10px] font-bold
                     rounded-full flex items-center
                     justify-center">
          {{ unreadCount() }}
        </span>
      }
    </button>

    @if (showNotifications()) {
      <div class="absolute left-1/2 -translate-x-1/2
                  top-12 w-80
                  bg-[var(--bg-card)]
                  border border-[var(--border)]
                  rounded-2xl shadow-xl z-50
                  overflow-hidden">
        <div class="flex items-center
                    justify-between px-4 py-3
                    border-b border-[var(--border)]">
          <span class="text-sm font-bold
                       text-[var(--text-primary)]">
            الإشعارات
          </span>
        </div>
        <div class="px-4 py-8 flex flex-col
                    items-center justify-center
                    text-[var(--text-muted)]">
          <span class="text-3xl">🔕</span>
          <span class="text-sm mt-2">
            لا توجد إشعارات
          </span>
        </div>
      </div>
    }
  </div>

  <div class="flex items-center gap-1">
    <button
      (click)="themeService.toggle()"
      class="hidden md:flex w-10 h-10 rounded-xl
             items-center justify-center
             text-[var(--text-secondary)]
             hover:bg-[var(--primary-light)]
             hover:text-[var(--primary)]
             transition-all duration-150">
      @if (themeService.isDark()) {
        ☀️
      } @else {
        🌙
      }
    </button>

    <div class="w-px h-7 bg-[var(--border)] mx-1"></div>

    <div class="relative" data-dropdown>
      <button
        (click)="showUserMenu.update(v => !v); showNotifications.set(false)"
        class="flex items-center gap-2.5
               px-3 py-1.5 rounded-xl
               hover:bg-[var(--primary-light)]
               transition-all duration-150
               cursor-pointer">
        <div class="w-9 h-9 rounded-full
                    flex items-center justify-center
                    flex-shrink-0
                    bg-gradient-to-br
                    from-[var(--primary)]
                    to-[var(--primary-hover)]
                    text-white font-bold">
          👤
        </div>
        <div class="hidden md:flex flex-col items-end">
          <span class="text-xs font-semibold
                       text-[var(--text-primary)]
                       leading-tight">
            {{ companyName() }}
          </span>
          <span class="text-[10px] text-[var(--text-muted)]">
            مدير الشركة
          </span>
        </div>
        <span class="text-[var(--text-muted)] hidden md:block">▼</span>
      </button>

      @if (showUserMenu()) {
        <div class="absolute left-0 top-12 w-52
                    bg-[var(--bg-card)]
                    border border-[var(--border)]
                    rounded-2xl shadow-xl
                    overflow-hidden z-50">
          <div class="px-4 py-3 border-b border-[var(--border)]">
            <p class="text-sm font-semibold text-[var(--text-primary)] m-0">
              {{ companyName() }}
            </p>
            <p class="text-xs text-[var(--text-muted)] m-0">
              مدير الشركة
            </p>
          </div>
          <div class="p-1.5 flex flex-col gap-0.5">
            <button class="flex items-center gap-3 px-3 py-2
                           rounded-lg text-sm w-full
                           text-right
                           text-[var(--text-secondary)]
                           hover:bg-[var(--primary-light)]
                           hover:text-[var(--primary)]
                           transition-all duration-150">
              <span>👤</span>
              <span>الملف الشخصي</span>
            </button>
            <div class="h-px bg-[var(--border)] my-1"></div>
            <button
              (click)="authService.logout()"
              class="flex items-center gap-3 px-3 py-2
                     rounded-lg text-sm w-full
                     text-right text-red-500
                     hover:bg-red-50
                     dark:hover:bg-red-950/20
                     transition-all duration-150">
              <span>🚪</span>
              <span>تسجيل الخروج</span>
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</header>
