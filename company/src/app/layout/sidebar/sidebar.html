<aside
  class="w-[260px] h-screen
         bg-[var(--bg-sidebar)]
         border-l border-[var(--border)]
         flex flex-col flex-shrink-0
         shadow-[-2px_0_12px_var(--shadow)]
         transition-transform duration-300 z-50
         fixed right-0 top-0
         md:relative md:translate-x-0"
  [class.translate-x-0]="isOpen()"
  [class.translate-x-full]="!isOpen()">

  <div class="flex items-center gap-3 p-5
              border-b border-[var(--border)]
              flex-shrink-0">
    <div class="w-10 h-10 rounded-xl flex items-center
                justify-center flex-shrink-0
                bg-gradient-to-br
                from-[var(--primary)]
                to-[var(--primary-hover)]
                shadow-md text-white font-bold">
      🚌
    </div>
    <div class="flex flex-col flex-1">
      <span class="text-base font-bold
                   text-[var(--text-primary)]
                   leading-tight">
        رحلة
      </span>
      <span class="text-[10px]
                   text-[var(--text-muted)]">
        لوحة الشركة
      </span>
    </div>
    <button
      class="md:hidden flex items-center justify-center
             w-8 h-8 rounded-lg
             text-[var(--text-secondary)]
             hover:bg-[var(--primary-light)]
             hover:text-[var(--primary)]
             transition-all duration-150"
      (click)="closeSidebar.emit()">
      ✕
    </button>
  </div>

  <div class="px-4 pt-4 pb-1 flex-shrink-0">
    <span class="text-[10px] font-semibold
                 text-[var(--text-muted)]
                 uppercase tracking-widest">
      القائمة الرئيسية
    </span>
  </div>

  <nav class="flex flex-col gap-1 px-3">
    @for (item of navItems; track item.path) {
      <a [routerLink]="item.path"
         routerLinkActive="bg-[var(--primary-light)] text-[var(--primary)] font-semibold border-r-[3px] border-[var(--primary)]"
         class="flex items-center gap-3
                px-3 py-2.5 rounded-xl
                text-sm font-medium
                no-underline
                text-[var(--text-secondary)]
                hover:bg-[var(--primary-light)]
                hover:text-[var(--primary)]
                transition-all duration-150"
         (click)="closeSidebar.emit()">
        <span class="w-5 text-center">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="flex-1"></div>

  <div class="h-px bg-[var(--border)] mx-4 my-2
              flex-shrink-0">
  </div>

  <div class="flex flex-col gap-1 px-3 pb-4
              flex-shrink-0">

    <button
      (click)="themeService.toggle()"
      class="flex items-center gap-3 px-3 py-2.5
             rounded-xl text-sm font-medium w-full
             text-right text-[var(--text-secondary)]
             hover:bg-[var(--primary-light)]
             hover:text-[var(--primary)]
             transition-all duration-150">
      @if (themeService.isDark()) {
        <span class="w-5">☀️</span>
        <span>الوضع النهاري</span>
      } @else {
        <span class="w-5">🌙</span>
        <span>الوضع الليلي</span>
      }
    </button>

    <button
      (click)="authService.logout()"
      class="flex items-center gap-3 px-3 py-2.5
             rounded-xl text-sm font-medium w-full
             text-right text-[var(--text-secondary)]
             hover:bg-red-50 hover:text-red-500
             dark:hover:bg-red-950/20
             transition-all duration-150">
      <span class="w-5">🚪</span>
      <span>تسجيل الخروج</span>
    </button>

  </div>
</aside>
