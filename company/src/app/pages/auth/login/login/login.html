<div class="min-h-screen bg-[var(--bg-base)]
            flex items-center justify-center
            p-4" dir="rtl">

  <div class="w-full max-w-md">

    <div class="flex flex-col items-center gap-3 mb-8">
      <div class="w-16 h-16 rounded-2xl
                  bg-gradient-to-br
                  from-[var(--primary)]
                  to-[var(--primary-hover)]
                  flex items-center justify-center
                  shadow-lg text-white">
        <svg lucideBus class="w-8 h-8"></svg>
      </div>
      <div class="text-center">
        <h1 class="text-2xl font-bold text-[var(--text-primary)]">
          رحلة
        </h1>
        <p class="text-sm text-[var(--text-muted)] mt-1">
          لوحة تحكم الشركة
        </p>
      </div>
    </div>

    <div class="rounded-2xl border
                border-[var(--border)]
                bg-[var(--bg-card)]
                shadow-[0_4px_24px_var(--shadow)]
                p-8">

      <h2 class="text-lg font-bold
                 text-[var(--text-primary)]
                 mb-6 text-center">
        تسجيل الدخول
      </h2>

      <form [formGroup]="form"
            (ngSubmit)="onSubmit()"
            class="flex flex-col gap-5">

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium
                        text-[var(--text-primary)]">
            البريد الإلكتروني
          </label>
          <div class="relative">
            <input
              formControlName="email"
              type="email"
              placeholder="example@company.com"
              class="w-full px-4 py-3 pr-10
                     rounded-xl border
                     border-[var(--border)]
                     bg-[var(--bg-base)]
                     text-[var(--text-primary)]
                     text-sm placeholder:text-[var(--text-muted)]
                     focus:outline-none
                     focus:border-[var(--primary)]
                     focus:ring-2
                     focus:ring-[var(--primary)]/20
                     transition-all duration-150">
            <div class="absolute top-1/2 right-3
                        -translate-y-1/2
                        text-[var(--text-muted)]">
              <svg lucideMail class="w-4 h-4"></svg>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium
                        text-[var(--text-primary)]">
            كلمة المرور
          </label>
          <div class="relative">
            <input
              formControlName="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              class="w-full px-4 py-3 pr-10 pl-10
                     rounded-xl border
                     border-[var(--border)]
                     bg-[var(--bg-base)]
                     text-[var(--text-primary)]
                     text-sm placeholder:text-[var(--text-muted)]
                     focus:outline-none
                     focus:border-[var(--primary)]
                     focus:ring-2
                     focus:ring-[var(--primary)]/20
                     transition-all duration-150">
            <div class="absolute top-1/2 right-3
                        -translate-y-1/2
                        text-[var(--text-muted)]">
              <svg lucideLock class="w-4 h-4"></svg>
            </div>
            <button
              type="button"
              (click)="showPassword.update(v => !v)"
              class="absolute top-1/2 left-3
                     -translate-y-1/2
                     text-[var(--text-muted)]
                     hover:text-[var(--primary)]
                     transition-colors">
              <svg lucideEye class="w-4 h-4"></svg>
            </button>
          </div>
        </div>

        @if (errorMessage()) {
          <div class="flex items-center gap-2
                      px-4 py-3 rounded-xl
                      bg-red-50 dark:bg-red-950/20
                      border border-red-200
                      dark:border-red-800">
            <svg lucideAlertCircle class="w-4 h-4 text-red-500 flex-shrink-0"></svg>
            <span class="text-sm text-red-600 dark:text-red-400">
              {{ errorMessage() }}
            </span>
          </div>
        }

        <button
          type="submit"
          [disabled]="isLoading() || form.invalid"
          class="w-full py-3 px-4 rounded-xl
                 bg-[var(--primary)] text-white
                 text-sm font-semibold
                 flex items-center justify-center
                 gap-2
                 hover:bg-[var(--primary-hover)]
                 active:scale-[0.98]
                 disabled:opacity-50
                 disabled:cursor-not-allowed
                 transition-all duration-150">
          @if (isLoading()) {
            <svg lucideLoaderCircle class="w-4 h-4 animate-spin"></svg>
            <span>جاري تسجيل الدخول...</span>
          } @else {
            <svg lucideLogIn class="w-4 h-4"></svg>
            <span>تسجيل الدخول</span>
          }
        </button>

      </form>

    </div>

    <p class="text-center text-xs text-[var(--text-muted)] mt-6">
      رحلة — منصة حجز التذاكر في السودان
    </p>

  </div>
</div>
