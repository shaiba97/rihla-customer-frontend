<div class="flex flex-col gap-6" dir="rtl">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-[var(--primary-light)] flex items-center justify-center text-2xl">
        🚌
      </div>
      <div>
        <h2 class="text-lg font-bold text-[var(--text-primary)] m-0">الحافلات</h2>
        <p class="text-sm text-[var(--text-muted)] m-0">إدارة الحافلات الشركة</p>
      </div>
    </div>
    <button
      (click)="openCreateForm()"
      class="flex items-center gap-2 px-4 py-2 rounded-xl bg-[var(--primary)] text-white font-medium hover:opacity-90 transition"
    >
      +
      إضافة حافلة
    </button>
  </div>

  @if (showForm()) {
    <div class="rounded-xl border border-[var(--border)] bg-[var(--bg-card)] shadow-[0_1px_3px_var(--shadow)] p-6">
      <h3 class="text-lg font-bold text-[var(--text-primary)] mb-4">
        {{ editingBus() ? 'تعديل حافلة' : 'إضافة حافلة جديدة' }}
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-[var(--text-muted)]">اسم الحافلة</label>
          <input
            [(ngModel)]="formData().name"
            type="text"
            class="px-4 py-3 rounded-xl border border-[var(--border)] bg-[var(--bg-main)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--primary)]"
            placeholder="أدخل اسم الحافلة"
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-[var(--text-muted)]">عدد المقاعد</label>
          <input
            [(ngModel)]="formData().chairs"
            type="number"
            class="px-4 py-3 rounded-xl border border-[var(--border)] bg-[var(--bg-main)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--primary)]"
            placeholder="أدخل عدد المقاعد"
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-[var(--text-muted)]">اتجاه المقاعد</label>
          <select
            [(ngModel)]="formData().seatStartFrom"
            class="px-4 py-3 rounded-xl border border-[var(--border)] bg-[var(--bg-main)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--primary)]"
          >
            <option value="RIGHT">يمين</option>
            <option value="LEFT">يسار</option>
          </select>
        </div>
      </div>
      <div class="flex items-center justify-end gap-3 mt-6">
        <button
          (click)="closeForm()"
          class="px-6 py-2 rounded-xl border border-[var(--border)] text-[var(--text-muted)] hover:bg-[var(--bg-card)] transition"
        >
          إلغاء
        </button>
        <button
          (click)="submitForm()"
          [disabled]="loading()"
          class="px-6 py-2 rounded-xl bg-[var(--primary)] text-white font-medium hover:opacity-90 transition disabled:opacity-50"
        >
          {{ loading() ? 'جاري الحفظ...' : (editingBus() ? 'تحديث' : 'حفظ') }}
        </button>
      </div>
    </div>
  }

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
    @for (bus of buses(); track bus.id) {
      <div
        (click)="goToBusDetails(bus.id)"
        class="rounded-xl border border-[var(--border)] bg-[var(--bg-card)] shadow-[0_1px_3px_var(--shadow)] overflow-hidden hover:shadow-lg transition cursor-pointer"
      >
        <div class="h-40 flex items-center justify-center bg-[var(--primary-light)] text-6xl">
          🚌
        </div>
        <div class="p-4">
          <h3 class="text-lg font-bold text-[var(--text-primary)] mb-2">{{ bus.name }}</h3>
          <p class="text-sm text-[var(--text-muted)] mb-4">
            {{ formatDate(bus.createdAt) }}
          </p>
          <div class="flex items-center gap-2">
            <button
              (click)="openEditForm(bus); $event.stopPropagation()"
              class="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-xl border border-[var(--primary)] text-[var(--primary)] hover:bg-[var(--primary-light)] transition"
            >
              ✏️
              تعديل
            </button>
            <button
              (click)="removeBusItem(bus.id); $event.stopPropagation()"
              class="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-xl border border-red-500 text-red-500 hover:bg-red-50 transition"
            >
              🗑️
              حذف
            </button>
          </div>
        </div>
      </div>
    }
  </div>

  @if (buses().length === 0) {
    <div class="flex flex-col items-center justify-center py-12 text-center">
      <div class="text-6xl mb-4">🚌</div>
      <p class="text-lg font-medium text-[var(--text-muted)]">لا توجد حافلات</p>
      <p class="text-sm text-[var(--text-muted)]">أضف حافلة جديدة للبدء</p>
    </div>
  }
</div>
